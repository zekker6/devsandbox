[project]
site_name = "devsandbox"
site_url = "https://zekker6.github.io/devsandbox/docs/"
site_description = "Sandbox your AI coding assistants. Run Claude Code, Copilot, aider, and other tools without exposing SSH keys, cloud credentials, or secrets."
site_author = "Zakhar Bessarab"
site_dir = "public/docs"
repo_url = "https://github.com/zekker6/devsandbox"
edit_uri = "edit/main/docs/"

copyright = "Built by zekker6. MIT licensed."

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Installation" = "getting-started/install.md" },
    { "Quick start" = "getting-started/quickstart.md" },
    { "First run" = "getting-started/first-run.md" },
  ] },
  { "Guides" = [
    { "Use cases" = "use-cases.md" },
    { "Supported tools" = "tools.md" },
  ] },
  { "Reference" = [
    { "How sandboxing works" = "sandboxing.md" },
    { "Configuration" = "configuration.md" },
    { "Proxy mode" = "proxy.md" },
  ] },
  { "About" = [
    { "Limitations" = "about/limitations.md" },
    { "Changelog" = "about/changelog.md" },
    { "License" = "about/license.md" },
  ] },
]

[project.theme]
language = "en"
features = [
  "navigation.sections",
  "navigation.indexes",
  "navigation.top",
  "navigation.tracking",
  "content.code.copy",
  "content.code.select",
  "content.action.edit",
  "search.highlight",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.snippets]
# base_path is relative to this config file's directory (repo root),
# letting --8<-- "README.md" pull the root README into docs/index.md.
base_path = ["."]
check_paths = true
